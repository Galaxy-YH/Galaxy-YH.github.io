title: Yuhang Sun # 如果留空，将自动使用下方的 First Last Name
first_name: Yuhang
middle_name: ""
last_name: Sun
contact_note: >
  Feel free to reach out for collaborations or discussions on Recommender Systems, GNNs, and LLMs.
description: > # 这里是显示在主页头像旁边的个人简介
  Undergraduate student at Central South University, Business School. Passionate about Recommender Systems, Graph Neural Networks (GNN), and Large Language Models (LLM).
footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> with <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.
  Hosted by <a href="https://pages.github.com/" target="_blank">GitHub Pages</a>.
keywords: jekyll, academic-website, portfolio, GNN, Recommendation Systems, Machine Learning, Central South University
lang: en # 默认英文学术风，如果你想全中文可以改为 zh-CN
icon: 🌌 # 配合你的 Galaxy 主题，把图标改成了星系

# 【极其重要】域名设置！
url: https://Galaxy-Yuhang.github.io # 请将 Galaxy-Yuhang 替换为你真实的 GitHub 用户名
baseurl: "" # 作为个人根目录主页，这里必须留空，否则网站样式会全部丢失！
last_updated: true 
impressum_path: 
back_to_top: true 
permissions:
  contents: write
  pages: write
  id-token: write
# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------

# repo color theme
repo_theme_light: default 
repo_theme_dark: dark 
repo_trophies:
  enabled: true
  theme_light: flat 
  theme_dark: gitdimmed 

external_services:
  github_readme_stats_url: https://github-readme-stats.vercel.app
  github_profile_trophy_url: https://github-profile-trophy.vercel.app

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------

navbar_fixed: true
footer_fixed: true
search_enabled: true
socials_in_search: true
posts_in_search: true
bib_search: true

max_width: 930px

serve_og_meta: false 
serve_schema_org: false 
og_image: 

# -----------------------------------------------------------------------------
# Analytics and search engine verification (暂不配置)
# -----------------------------------------------------------------------------
google_analytics: 
cronitor_analytics: 
pirsch_analytics: 
openpanel_analytics: 
google_site_verification: 
bing_site_verification: 

# -----------------------------------------------------------------------------
# Blog
# -----------------------------------------------------------------------------

blog_name: Yuhang's Notes 
blog_description: Thoughts on Algorithms, Code, and Life. # 博客简介
permalink: /blog/:year/:title/
lsi: false 

pagination:
  enabled: true

related_blog_posts:
  enabled: true
  max_related: 5

# 如果你想开通评论区，以后可以在这里配置 Giscus
giscus:
  repo: 
  repo_id: 
  category: Comments 
  category_id: 
  mapping: title 
  strict: 1 
  reactions_enabled: 1 
  input_position: bottom 
  dark_theme: dark 
  light_theme: light 
  emit_metadata: 0
  lang: en

disqus_shortname: 

external_sources: [] # 暂时清空外部 RSS 引用

newsletter:
  enabled: false
  endpoint: 

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------

collections:
  books:
    output: true
  news:
    defaults:
      layout: post
    output: true
  projects:
    output: true
  teachings:
    output: true

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

include: ["_pages", "_scripts"]
exclude:
  - bin/
  - CONTRIBUTING.md
  - CUSTOMIZE.md
  - Dockerfile
  - docker-compose.yml
  - docker-compose-slim.yml
  - FAQ.md
  - Gemfile
  - Gemfile.lock
  - INSTALL.md
  - LICENSE
  - lighthouse_results/
  - package.json
  - package-lock.json
  - _pages/about_einstein.md
  - purgecss.config.js
  - README.md
  - readme_preview/
  - vendor
keep_files:
  - CNAME
  - .nojekyll

plugins:
  - jekyll-3rd-party-libraries
  - jekyll-archives-v2
  - jekyll-cache-bust
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-get-json
  - jekyll-imagemagick
  - jekyll-jupyter-notebook
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll-regex-replace
  - jekyll/scholar
  - jekyll-sitemap
  - jekyll-socials
  - jekyll-tabs
  - jekyll-terser
  - jekyll-toc
  - jekyll-twitter-plugin
  - jemoji

defaults:
  - scope:
      path: "assets"
    values:
      sitemap: false

sass:
  style: compressed

jekyll-minifier:
  compress_javascript: false 
  exclude: ["robots.txt", "assets/js/search/*.js"]

terser:
  compress:
    drop_console: true

jekyll-archives:
  posts:
    enabled: [year, tags, categories] 
    permalinks:
      year: "/blog/:year/"
      tags: "/blog/:type/:name/"
      categories: "/blog/:type/:name/"
  books:
    enabled: [year, tags, categories] 

display_tags: ["GNN", "LLM", "Recommendation", "C++", "PyTorch"] # 主页博客默认显示的标签
display_categories: []

# -----------------------------------------------------------------------------
# Jekyll Scholar (用于生成你的论文发表列表)
# -----------------------------------------------------------------------------

scholar:
  last_name: [Sun] # 修改为你的姓氏
  first_name: [Yuhang, Y.] # 修改为你的名字

  style: apa
  locale: en

  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib
  bibtex_filters: [latex, smallcaps, superscript]

  replace_strings: true
  join_strings: true

  details_dir: bibliography
  details_link: Details

  query: "@*"
  group_by: year
  group_order: descending

enable_publication_badges:
  altmetric: true 
  dimensions: true 
  google_scholar: true 
  inspirehep: true 

filtered_bibtex_keywords:
  [
    abbr, abstract, additional_info, altmetric, annotation, arxiv, award, award_name, bibtex_show, blog, code, dimensions, eprint, google_scholar_id, hal, html, inspirehep_id, pdf, pmid, poster, preview, selected, slides, supp, video, website,
  ]

max_author_limit: 3 
more_authors_animation_delay: 10 
enable_publication_thumbnails: true

# -----------------------------------------------------------------------------
# Jekyll Link Attributes & Images
# -----------------------------------------------------------------------------

external_links:
  enabled: true
  rel: external nofollow noopener
  target: _blank
  exclude:

imagemagick:
  enabled: false # 建议初期关闭，除非你在本地配置好了 imagemagick 环境，否则 GitHub Actions 编译容易报错
  widths:
    - 480
    - 800
    - 1400
  input_directories:
    - assets/img/
  input_formats:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".tiff"
    - ".gif"
  output_formats:
    webp: "-auto-orient -quality 85"

lazy_loading_images: true 

# -----------------------------------------------------------------------------
# Optional Features
# -----------------------------------------------------------------------------

enable_google_analytics: false 
enable_cronitor_analytics: false 
enable_pirsch_analytics: false 
enable_openpanel_analytics: false 
enable_google_verification: false 
enable_bing_verification: false 
enable_cookie_consent: false 
enable_masonry: true 
enable_math: true # 默认开启 MathJax，完美支持你的计量经济学等公式推导
enable_tooltips: false 
enable_darkmode: true 
enable_navbar_social: true # 开启导航栏社交图标
enable_project_categories: true 
enable_medium_zoom: true 
enable_progressbar: true 
enable_video_embedding: false 

# 后续省略的 Library versions 与获取外部 JSON data 部分不需要修改，保持原样即可
# -----------------------------------------------------------------------------
# 第三方库配置（必须保留，不能删除或留空）
# -----------------------------------------------------------------------------
third_party_libraries:
  download: false
  bootstrap-table:
    version: "1.22.4"
    url:
      css: "https://cdn.jsdelivr.net/npm/bootstrap-table@{{version}}/dist/bootstrap-table.min.css"
      js: "https://cdn.jsdelivr.net/npm/bootstrap-table@{{version}}/dist/bootstrap-table.min.js"
  jquery:
    version: "3.6.0"
    url:
      js: "https://cdn.jsdelivr.net/npm/jquery@{{version}}/dist/jquery.min.js"
  mathjax:
    version: "3.2.2"
    url:
      js: "https://cdn.jsdelivr.net/npm/mathjax@{{version}}/es5/tex-mml-chtml.js"
# 注意：即使你不需要其他库，至少保留上面这几个基本的，否则插件会报错
